name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-ci:
    name: Backend (Python + Django)
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: elevator_db_test
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        working-directory: ./backend
        run: uv sync --frozen

      - name: Django System Check
        working-directory: ./backend
        run: DJANGO_SECRET_KEY=ci-test-key-not-for-production DJANGO_DEBUG=True uv run python manage.py check

      - name: Lint with ruff
        working-directory: ./backend
        run: uv run ruff check . --ignore E501,E402

      - name: Type check with mypy
        working-directory: ./backend
        run: uv run mypy . --ignore-missing-imports --disable-error-code import-untyped

      - name: Run Tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgres://user:password@localhost:5432/elevator_db_test
          DJANGO_SECRET_KEY: ci-test-key-not-for-production
          DJANGO_DEBUG: "False"
          USE_MOCK_GEOCLIENT: "True"
          USE_MOCK_SERPAPI: "True"
        run: uv run pytest

  frontend-ci:
    name: Frontend (Node + React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint
        working-directory: ./frontend
        run: npm run lint

      - name: Build
        working-directory: ./frontend
        run: npm run build