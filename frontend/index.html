<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Fonts — preconnect before any render-blocking CSS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Mulish:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary SEO -->
    <title>Elevator Advocate — Real-Time NYC Elevator Outage Tracking &amp; Tenant Advocacy</title>
    <meta name="description" content="Track NYC elevator outages in real time. When two neighbors confirm a breakdown within 2 hours, it becomes a verified record — with Loss of Service metrics ready for Housing Court or a Council briefing. Built by a Bronx resident for his community." />
    <meta name="keywords" content="NYC elevator outage, NYCHA elevator down, broken elevator New York City, tenant advocacy NYC, report elevator 311, housing accountability NYC, Loss of Service metric, elevator tracking public housing, NYC Council district housing data, NYCHA elevator repair, Bronx housing advocacy, tenant rights New York" />
    <meta name="author" content="Karl Johnson" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#0d1b2a" />
    <link rel="canonical" href="https://elevatoradvocate.nyc" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Open Graph (social sharing + LinkedIn preview) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://elevatoradvocate.nyc" />
    <meta property="og:site_name" content="Elevator Advocate" />
    <meta property="og:title" content="Elevator Advocate — Real-Time NYC Elevator Outage Tracking" />
    <meta property="og:description" content="Two neighbors. Two hours. Verified. Elevator Advocate turns tenant reports into Loss of Service data that holds landlords and the city accountable. Built in the Bronx for NYC tenants." />
    <meta property="og:image" content="https://elevatoradvocate.nyc/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:alt" content="Elevator Advocate — Real-time NYC elevator outage tracking for tenants" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Elevator Advocate — NYC Elevator Outage Tracking" />
    <meta name="twitter:description" content="Real-time elevator outage verification for NYC tenants. Two confirmed reports = a verified record for Housing Court or your Council rep." />
    <meta name="twitter:image" content="https://elevatoradvocate.nyc/og-image.jpg" />

    <!-- Structured Data: WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Elevator Advocate",
      "description": "Real-time elevator outage tracking and tenant advocacy platform for New York City. Verifies outages via 2-hour consensus, calculates Loss of Service metrics, and connects tenants with their NYC Council representative.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Web",
      "inLanguage": ["en", "es"],
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Person",
        "name": "Karl Johnson",
        "url": "https://www.linkedin.com/in/hirekarl",
        "sameAs": [
          "https://www.linkedin.com/in/hirekarl",
          "https://github.com/hirekarl"
        ],
        "affiliation": {
          "@type": "Organization",
          "name": "Pursuit",
          "url": "https://www.pursuit.org/ai-native-program"
        }
      },
      "spatialCoverage": {
        "@type": "Place",
        "name": "New York City",
        "sameAs": "https://www.wikidata.org/wiki/Q60"
      },
      "audience": [
        {
          "@type": "Audience",
          "audienceType": "Tenants in NYC public and subsidized housing"
        },
        {
          "@type": "Audience",
          "audienceType": "NYC Council members and housing policy advocates"
        },
        {
          "@type": "Audience",
          "audienceType": "Housing court advocates and legal aid attorneys"
        }
      ],
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://api.elevatoradvocate.nyc/api/buildings/lookup/?house_number={house_number}&street={street}&borough={borough}"
        },
        "query-input": [
          "required name=house_number",
          "required name=street",
          "required name=borough"
        ]
      }
    }
    </script>

    <!-- Structured Data: Dataset -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Dataset",
      "name": "NYC Elevator Outage Reports",
      "description": "Crowd-verified elevator outage reports for NYC residential buildings, cross-referenced with NYC Department of Buildings complaint history. Reports achieve verified status via 2-hour consensus from independent tenant submissions.",
      "url": "https://elevatoradvocate.nyc",
      "creator": {
        "@type": "Person",
        "name": "Karl Johnson",
        "sameAs": [
          "https://www.linkedin.com/in/hirekarl",
          "https://github.com/hirekarl"
        ]
      },
      "license": "https://creativecommons.org/licenses/by/4.0/",
      "isAccessibleForFree": true,
      "keywords": [
        "elevator outage", "NYC housing", "tenant advocacy",
        "NYCHA", "Loss of Service", "DOB complaints", "Building Identification Number"
      ],
      "spatialCoverage": {
        "@type": "Place",
        "name": "New York City",
        "sameAs": "https://www.wikidata.org/wiki/Q60"
      },
      "temporalCoverage": "2024/..",
      "distribution": {
        "@type": "DataDownload",
        "encodingFormat": "application/json",
        "contentUrl": "https://api.elevatoradvocate.nyc/api/buildings/map/"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
