services:
  # 1. Django API
  - type: web
    name: elevator-advocate-api
    env: python
    buildCommand: "./render_build.sh"
    startCommand: "uv run --directory backend gunicorn config.wsgi"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        fromDatabase:
          name: elevator-advocate-db
          property: connectionString
      - key: DJANGO_DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173,https://elevator-advocate-frontend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "http://localhost:5173,https://elevator-advocate-frontend.onrender.com"

      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: "elevator-advocate-api.onrender.com,localhost,127.0.0.1" # Update after first deploy with actual domain
      - key: SEED_ADMIN_USERNAME
        value: "admin"
      - key: SEED_ADMIN_EMAIL
        value: "admin@elevatoradvocate.nyc"
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_USER_PASSWORD
        sync: false

  # 2. Django Task Worker
  - type: worker
    name: elevator-advocate-worker
    env: python
    buildCommand: "./render_build.sh"
    startCommand: "uv run --directory backend python manage.py runworker"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DATABASE_URL
        fromDatabase:
          name: elevator-advocate-db
          property: connectionString
      - key: DJANGO_DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173,https://elevator-advocate-frontend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "http://localhost:5173,https://elevator-advocate-frontend.onrender.com"


  # 3. React Frontend
  - type: web
    name: elevator-advocate-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    envVars:
      - key: VITE_API_URL
        value: "https://elevator-advocate-api.onrender.com"


databases:
  - name: elevator-advocate-db
    plan: basic-256mb
